# TEMPLATE — substitute real values via:
#   kubectl create secret generic fte-secrets \
#     --from-literal=GROQ_API_KEY=gsk_... \
#     --from-literal=DATABASE_URL=postgresql://... \
#     ...
#   OR use Sealed Secrets / External Secrets Operator in production.
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
type: Opaque
stringData:
  GROQ_API_KEY: "${GROQ_API_KEY}"
  DATABASE_URL: "${DATABASE_URL}"
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_WHATSAPP_NUMBER: "${TWILIO_WHATSAPP_NUMBER}"
  GMAIL_CREDENTIALS_PATH: "/app/credentials/gmail_credentials.json"
