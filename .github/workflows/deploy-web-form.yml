name: Deploy Web Form to Vercel

on:
  push:
    branches: [main]
    paths:
      - "web-form/**"
  pull_request:
    branches: [main]
    paths:
      - "web-form/**"

jobs:
  deploy:
    name: ${{ github.event_name == 'push' && 'Production Deploy' || 'Preview Deploy' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-form/package-lock.json

      - name: Install dependencies
        working-directory: web-form
        run: npm ci

      - name: Type-check & build
        working-directory: web-form
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Vercel (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: web-form
        run: npx vercel@39 --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        working-directory: web-form
        run: npx vercel@39 --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
